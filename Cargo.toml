[workspace]
members = [ 
    "ctor", 
    "dtor", 
    "ctor-proc-macro",
    "dtor-proc-macro",
    "shared",
]
default-members = [
    "ctor",
    "dtor",
    "ctor-proc-macro",
    "dtor-proc-macro",
    "shared",
]
exclude = [
    "tests"
]
resolver = "2"

[patch.crates-io]
ctor = { path = "ctor" }
dtor = { path = "dtor" }
dtor-proc-macro = { path = "dtor-proc-macro" }
ctor-proc-macro = { path = "ctor-proc-macro" }
