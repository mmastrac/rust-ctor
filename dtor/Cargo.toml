[package]
name = "dtor"
version = "0.4.0"
authors.workspace = true
edition = "2021"
description = "__attribute__((destructor)) for Rust"
license.workspace = true
repository.workspace = true
readme = "README.md"
categories = ["no-std"]
rust-version = "1.60"

[features]
default = ["std", "proc_macro", "no_warn_on_missing_unsafe"]
std = []
proc_macro = ["dep:dtor-proc-macro"]
used_linker = []
no_warn_on_missing_unsafe = []

[dependencies]
dtor-proc-macro = { version = "=0.0.6", optional = true }

[dev-dependencies]
libc-print = "0.1"

[lib]
name = "dtor"
